name: Auto-Merge Agent Bender PRs

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]

jobs:
  backend-change-detection:
    name: Detect Backend Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Check for package.json changes
        id: backend_check
        run: |
          if git diff --name-only origin/master...HEAD | grep -E '^package\.json$'; then
            echo "has_backend_changes=true" >> $GITHUB_OUTPUT
            echo "### ❌ package.json Changes Detected" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This PR cannot be auto-merged because:" >> $GITHUB_STEP_SUMMARY
            echo "- � package.json was modified" >> $GITHUB_STEP_SUMMARY
          else
            echo "has_backend_changes=false" >> $GITHUB_OUTPUT
            echo "### ✅ No package.json Changes" >> $GITHUB_STEP_SUMMARY
            echo "This PR is safe for auto-merge" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Label PR based on backend check
        uses: actions/github-script@v7
        with:
          script: |
            const hasBackendChanges = ${{ steps.backend_check.outputs.has_backend_changes }};
            const labels = hasBackendChanges
              ? ['needs-backend-review', 'agent-bender']
              : ['safe-frontend-only', 'agent-bender'];

            // Remove opposite labels
            const labelsToRemove = hasBackendChanges
              ? ['safe-frontend-only']
              : ['needs-backend-review'];

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                });
              } catch (e) {
                // Label might not exist, ignore
              }
            }

            // Add appropriate labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });

      - name: Fail check if backend changes detected
        if: steps.backend_check.outputs.has_backend_changes == 'true'
        run: |
          echo "::error::Backend changes detected - auto-merge blocked"
          exit 1

  enable-auto-merge:
    name: Enable Auto-Merge
    runs-on: ubuntu-latest
    needs: backend-change-detection
    if: github.event.pull_request.draft == false

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check if PR has approval
        id: check_approval
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            const hasApproval = reviews.some(review => review.state === 'APPROVED');
            return hasApproval ? 'true' : 'false';

      - name: Enable auto-merge
        if: steps.check_approval.outputs.result == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh pr merge --auto --squash "$PR_URL"
          echo "✅ Auto-merge enabled - PR will merge when all checks pass" >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR
        if: steps.check_approval.outputs.result == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 **Auto-merge enabled!** This PR will automatically merge when:\n- ✅ All required checks pass\n- ✅ Branch is up to date with `master`\n\n_This is a frontend-only change from agent-bender._'
            });
